<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaySafu – Internet Speed</title>
    <link rel="stylesheet" href="./style-sheet/index.css">
    <link rel="stylesheet" href="./style-sheet/InternetSpeed.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header class="site-header">
        <div class="header-pill">
            <a href="./index.html" class="logo-bubble">
                <img src="./Assets/logo/Safu-logo.png" alt="StaySafu" class="logo-img">
            </a>
            <nav class="header-nav">
                <a href="#" class="nav-link">Solutions</a>
                <a href="#" class="nav-link">Audit</a>
                <a href="#" class="nav-link">Pricing</a>
            </nav>
            <div class="nav-sep"></div>
            <div class="header-actions">
                <a href="#" class="btn-signin">Sign In</a>
                <a href="#" class="btn-signup">Sign Up</a>
            </div>
        </div>
    </header>

    <!-- ═══════════════════ SPEED TEST ═══════════════════ -->
    <main class="speed-page">
        <div class="speed-card">

            <p class="speed-label" id="statusText">Your internet speed</p>

            <div class="speed-display">
                <span class="speed-value" id="speedValue">—</span>
                <span class="speed-unit" id="speedUnit">Mbps</span>
            </div>

            <!-- Ring progress indicator -->
            <div class="speed-ring-wrap">
                <svg class="speed-ring" viewBox="0 0 120 120">
                    <circle class="ring-track" cx="60" cy="60" r="52"/>
                    <circle class="ring-fill" cx="60" cy="60" r="52" id="ringFill"/>
                </svg>
            </div>

            <button class="btn-start" id="startBtn" onclick="startTest()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                Start Test
            </button>

            <!-- Extra metrics (shown after test) -->
            <div class="speed-meta" id="speedMeta">
                <div class="meta-item">
                    <span class="meta-value" id="pingVal">—</span>
                    <span class="meta-label">Ping (ms)</span>
                </div>
                <div class="meta-divider"></div>
                <div class="meta-item">
                    <span class="meta-value" id="downloadVal">—</span>
                    <span class="meta-label">Download</span>
                </div>
                <div class="meta-divider"></div>
                <div class="meta-item">
                    <span class="meta-value" id="statusVal">—</span>
                    <span class="meta-label">Status</span>
                </div>
            </div>

        </div>
    </main>

    <!-- ═══════════════════ FOOTER ═══════════════════ -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-logo-wrap">
                <img src="./Assets/logo/Safu-logo.png" alt="StaySafu" class="footer-logo">
            </div>
            <nav class="footer-nav">
                <a href="#" class="footer-link">Terms of Service</a>
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="#" class="footer-link">Security Audit</a>
                <a href="#" class="footer-link">Documentation</a>
            </nav>
        </div>
        <div class="footer-copy">
            © 2024 STAYSAFU. PROTECTED BY TECHNICAL PRECISION.
        </div>
    </footer>

    <script>
        let testing = false;

        async function startTest() {
            if (testing) return;
            testing = true;

            const btn       = document.getElementById('startBtn');
            const speedVal  = document.getElementById('speedValue');
            const statusTxt = document.getElementById('statusText');
            const ringFill  = document.getElementById('ringFill');
            const pingVal   = document.getElementById('pingVal');
            const dlVal     = document.getElementById('downloadVal');
            const statusVal = document.getElementById('statusVal');

            // Reset UI
            speedVal.textContent  = '0';
            statusTxt.textContent = 'Testing…';
            btn.disabled = true;
            btn.innerHTML = `<span class="btn-spinner"></span> Testing…`;
            setRing(0);

            // ── Ping test ────────────────────────────────────────────
            const pingStart = performance.now();
            try {
                await fetch('https://www.cloudflare.com/cdn-cgi/trace', { cache: 'no-store', mode: 'no-cors' });
            } catch (_) {}
            const ping = Math.round(performance.now() - pingStart);
            pingVal.textContent = ping + ' ms';

            // ── Download speed test ──────────────────────────────────
            // Fetch a ~5 MB public file and measure throughput
            const testUrl  = 'https://speed.cloudflare.com/__down?bytes=5000000';
            const dlStart  = performance.now();
            let   bytes    = 0;

            try {
                const res    = await fetch(testUrl + '&_=' + Date.now(), { cache: 'no-store' });
                const reader = res.body.getReader();
                const total  = 5_000_000;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    bytes += value.length;

                    // Live speed update
                    const elapsed = (performance.now() - dlStart) / 1000;
                    const mbps    = ((bytes * 8) / elapsed / 1_000_000).toFixed(1);
                    speedVal.textContent = mbps;
                    setRing(Math.min(bytes / total, 1));
                }
            } catch (err) {
                statusTxt.textContent = 'Test failed – check connection';
                resetBtn();
                testing = false;
                return;
            }

            const elapsed = (performance.now() - dlStart) / 1000;
            const finalMbps = ((bytes * 8) / elapsed / 1_000_000).toFixed(1);

            // ── Final display ────────────────────────────────────────
            speedVal.textContent  = finalMbps;
            statusTxt.textContent = 'Test complete';
            dlVal.textContent     = finalMbps + ' Mbps';
            statusVal.textContent = finalMbps > 25 ? '✓ Good' : finalMbps > 5 ? '~ Fair' : '✗ Slow';
            statusVal.style.color = finalMbps > 25 ? '#00d4ff' : finalMbps > 5 ? '#f59e0b' : '#ef4444';

            setRing(1);
            resetBtn();
            testing = false;
        }

        function setRing(pct) {
            const ring = document.getElementById('ringFill');
            const circ = 2 * Math.PI * 52; // r=52
            ring.style.strokeDashoffset = circ - pct * circ;
        }

        function resetBtn() {
            const btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Retest`;
        }
    </script>

</body>
</html>
