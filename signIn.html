<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaySafu – Sign In</title>
    <link rel="stylesheet" href="./style-sheet/index.css">
    <link rel="stylesheet" href="./style-sheet/signIn.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header class="site-header">
        <div class="header-pill">
            <a href="./index.html" class="logo-bubble">
                <img src="./Assets/logo/Safu-logo.png" alt="StaySafu" class="logo-img">
            </a>
            <nav class="header-nav">
                <a href="#" class="nav-link">Solutions</a>
                <a href="#" class="nav-link">Audit</a>
                <a href="#" class="nav-link">Pricing</a>
            </nav>
            <div class="nav-sep"></div>
            <div class="header-actions">
                <a href="./signIn.html" class="btn-signin">Sign In</a>
                <a href="./signUp.html" class="btn-signup">Sign Up</a>
            </div>
        </div>
    </header>

    <!-- ═══════════════════ MAIN ═══════════════════ -->
    <main class="auth-page">
        <div class="auth-card">

            <!-- Toggle nav -->
            <div class="auth-toggle">
                <a href="./signUp.html" class="toggle-btn">Sign Up</a>
                <a href="./signIn.html" class="toggle-btn toggle-btn--active">Sign In</a>
            </div>

            <!-- Form -->
            <form class="auth-form" action="#" method="post">
                <div class="form-group">
                    <label class="form-label" for="si-email">Email address</label>
                    <input
                        id="si-email"
                        type="email"
                        name="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="si-password">Password</label>
                    <input
                        id="si-password"
                        type="password"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                    />
                </div>

                <button type="submit" class="auth-submit">Sign In</button>
            </form>

        </div>
    </main>

    <script src="./frontend.js"></script>
</body>

</html>
